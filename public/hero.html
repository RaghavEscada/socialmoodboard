<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Moodboard</title>
  <!-- Load GSAP and plugins from CDN with specific versions that are known to work -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/CustomEase.min.js"></script>
  <script src="https://unpkg.com/split-type@0.2.5/umd/index.min.js"></script>
  <style>
          
          @import url('https://fonts.googleapis.com/css2?family=Gilda+Display&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Gilda Display", serif;
      background-color: #6c6c64ca;
      overflow: hidden; /* Prevent scrollbars from video */
    }

    /* Video background styles */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .video-background video {
      position: absolute;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    /* Video overlay for better content visibility */
    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(108, 108, 100, 0.4); /* Match original background with opacity */
      z-index: -1;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    p {
      text-transform: uppercase;
      font-family: "Gilda Display", serif;
    }

    a {
      text-decoration: none;
      text-transform: uppercase;
      font-family: "Gilda Display", serif;
      font-size: 0.7rem;
      color: #000;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100svh;
      padding: 2em;
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      z-index: 10; /* Ensure overlay is above video */
    }

    .loader {
      text-align: center;
    }

    .sm-logo {
      max-width: 300px;
      height: auto;
    }

    .banner-img {
      position: absolute;
      top: 45%;
      transform: translate(-50%, -50%) scale(0);
      aspect-ratio: 4/5;
      z-index: 3; /* Default z-index for banner images */
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .banner-img-1 {
      left: 38%;
      width: 18%;
      z-index: 3; /* Behind the middle image */
    }

    .banner-img-2 {
      left: 50%;
      width: 24%;
      z-index: 5; /* Highest z-index to appear in front */
    }

    .banner-img-3 {
      left: 62%;
      width: 18%;
      z-index: 3; /* Behind the middle image */
    }

    .intro-copy {
      position: absolute;
      top: 45%;
      transform: translateY(-50%);
      width: 100%;
      padding: 7;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 4; /* Ensure intro copy is above video */
    }

    .title {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4; /* Ensure title is above video */
    }

    .intro-copy h3,
    .title h1 {
      position: relative;
      text-transform: uppercase;
      color: #fff; /* Changed to white for better visibility against video */
      font-family: "Gilda Display", serif;
      font-weight: 500;
      font-style: italic;
      line-height: 0.9;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5); /* Add shadow for better readability */
    }

    .title h1 {
      font-size: 6rem;
    }

    .intro-copy h3 {
      font-size: 3rem;
    }

    .intro-copy h3,
    .title h1 {
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
    }

    .intro-copy h3 .word,
    .title h1 .word {
      display: inline-block;
      position: relative;
      will-change: transform;
      margin-right: 0.1rem;
    }

    @media (max-width: 900px) {
      .loader {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .intro-copy,
      .banner-img {
        display: none;
      }

      .title {
        width: 100%;
        bottom: 20%;
        display: flex;
        justify-content: center;
      }

      .title h1 {
        font-size: 4rem;
      }

      .intro-copy h3 {
        font-size: 2.5rem;
      }
    }
  </style>
</head>

<body>
  <!-- Add video background -->
  <div class="video-background">
    <video autoplay loop muted playsinline>
      <source src="sm.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
  <div class="video-overlay"></div>

  <div class="overlay">
    <div class="loader">
      <img src="smlogo.png" alt="Social Moodboard Logo" class="sm-logo" />
    </div>
  </div>

  <div class="banner-img banner-img-1"><img src="img4.jpeg" alt="" /></div>
  <div class="banner-img banner-img-2"><img src="img1.jpeg" alt="" /></div>
  <div class="banner-img banner-img-3"><img src="img2.jpeg" alt="" /></div>
  
  <div class="intro-copy">
    <h3 >We Don't Do</h3>
    <h3>Ordinary Here</h3>
  </div>

 

  <script>
    // Use a flag to ensure animations only run once
    let animationHasRun = false;
    
    document.addEventListener("DOMContentLoaded", () => {
      // Only run animation if it hasn't run yet
      if (animationHasRun) return;
      animationHasRun = true;
      
      if (typeof gsap === 'undefined') {
        console.error("GSAP not loaded, please check the script tag");
        document.querySelector('.overlay').style.opacity = 0;
        return;
      }
      
      // Register the CustomEase plugin properly
      gsap.registerPlugin(CustomEase);
      
      // Check if SplitType exists before using it
      let introCopy, titleHeading;
      if (typeof SplitType !== 'undefined') {
        introCopy = new SplitType(".intro-copy h3", {
          types: "words",
          absolute: false,
        });

        titleHeading = new SplitType(".title h1", {
          types: "words",
          absolute: false,
        });
      } else {
        console.warn("SplitType not available, using fallback");
        // Simple fallback for SplitType
        document.querySelectorAll(".intro-copy h3, .title h1").forEach(el => {
          const words = el.textContent.split(' ');
          el.innerHTML = '';
          words.forEach(word => {
            const span = document.createElement('span');
            span.className = 'word';
            span.textContent = word + ' ';
            el.appendChild(span);
          });
        });
        
        introCopy = { words: document.querySelectorAll(".intro-copy h3 .word") };
        titleHeading = { words: document.querySelectorAll(".title h1 .word") };
      }

      // Initial states
      gsap.set(introCopy.words, {
        y: "110%",
      });

      gsap.set(titleHeading.words, {
        y: "110%",
      });
      
      // Simple animation sequence
      const timeline = gsap.timeline({
        onComplete: function() {
          // Remove the overlay element completely after animation
          const overlay = document.querySelector('.overlay');
          if (overlay && overlay.parentNode) {
            overlay.parentNode.removeChild(overlay);
          }
        }
      });
      
      // 1. Logo fade in
      timeline.fromTo(".sm-logo", 
        { opacity: 0 },
        { 
          opacity: 1, 
          duration: 1.5,
          ease: "power2.inOut"
        }
      );
      
      // 2. Delay, then fade out the entire overlay
      timeline.to(".overlay", {
        opacity: 0,
        duration: 2,
        delay: 1,
        ease: "power2.inOut",
        onComplete: () => {
          // 3. After overlay is gone, show the images
          gsap.to(".banner-img", { 
            scale: 1, 
            duration: 1,
            stagger: 0.2,
            ease: "back.out(1.4)"
          });
          
          // 4. Position the images
          gsap.to(".banner-img-1", {
            left: "38%",
            rotate: -6,
            duration: 1.2,
            ease: "power2.out"
          });
          
          gsap.to(".banner-img-2", {
            left: "50%",
            rotate: 0,
            duration: 1.2,
            ease: "power2.out"
          });
          
          gsap.to(".banner-img-3", {
            left: "62%",
            rotate: 6,
            duration: 1.2,
            ease: "power2.out"
          });
          
          // 5. Show text elements after images
          gsap.to(titleHeading.words, {
            y: "0%",
            duration: 0.9,
            stagger: 0.08,
            delay: 0.5,
            ease: "power3.out",
          });
          
          gsap.to(introCopy.words, {
            y: "0%",
            duration: 0.9,
            stagger: 0.08,
            delay: 0.7,
            ease: "power3.out",
          });
        }
      });
    });
  </script>
</body>

</html>
