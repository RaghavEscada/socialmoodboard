<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Circular Image Gallery | Enhanced</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 500vh;
      background-color: #e6e5e3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    p {
      text-transform: uppercase;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: bold;
      line-height: 1.125;
      color: #fff;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      padding: 1.5em;
      display: flex;
      z-index: 2;
      mix-blend-mode: difference;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100vw;
      padding: 1.5em;
      display: flex;
      justify-content: space-between;
      z-index: 2;
      mix-blend-mode: difference;
    }

    .nav-col {
      flex: 1;
    }

    .nav-col:nth-child(1) {
      display: flex;
    }

    .nav-col:nth-child(1) p {
      flex: 1;
    }

    .nav-col:nth-child(2) {
      text-align: right;
    }

    .view-all-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #000;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
    }

    .view-all-btn:hover {
      background-color: #333;
    }

    .grid-view {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.9);
      z-index: 20;
      display: none;
      overflow-y: scroll;
      padding: 50px 20px 100px;
      -webkit-overflow-scrolling: touch;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto 50px;
    }

    .grid-item {
      position: relative;
      aspect-ratio: 1/1;
      border-radius: 5px;
      overflow: hidden;
    }

    .close-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: transparent;
      color: #fff;
      border: none;
      font-size: 24px;
      cursor: pointer;
      z-index: 21;
      transition: transform 0.3s ease;
    }

    .close-btn:hover {
      transform: scale(1.2);
    }

    .grid-header {
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: 600;
    }

    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #e6e5e3;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 30;
      transition: opacity 0.5s ease;
    }

    .loader-content {
      text-align: center;
    }

    .loader-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      border-top: 5px solid #000;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .scroll-indicator {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: #000;
      font-size: 12px;
      letter-spacing: 1px;
      opacity: 0.7;
      text-align: center;
      z-index: 5;
    }

    .scroll-arrow {
      display: block;
      width: 20px;
      height: 20px;
      border-bottom: 2px solid #000;
      border-right: 2px solid #000;
      transform: rotate(45deg);
      margin: 10px auto;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0) rotate(45deg);
      }
      40% {
        transform: translateY(-10px) rotate(45deg);
      }
      60% {
        transform: translateY(-5px) rotate(45deg);
      }
    }
  </style>
</head>

<body>
  <div class="loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <p style="color: #000;">LOADING GALLERY</p>
    </div>
  </div>

  <div class="nav">
    <div class="nav-col">
      <p>Social Moodboard</p>
    </div>
    <div class="nav-col">
      <p>SCROLL TO EXPLORE</p>
    </div>
  </div>

  <div class="scroll-indicator">
    <span>SCROLL DOWN</span>
    <span class="scroll-arrow"></span>
  </div>

  <button class="view-all-btn">VIEW ALL PHOTOS</button>

  <div class="grid-view">
    <button class="close-btn">×</button>
    <h2 class="grid-header">All Gallery Images</h2>
    <div class="grid-container"></div>
  </div>

  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Available images (assuming we have img1.jpg through img12.jpg)
    const availableImageCount = 12;
    const allImageNumbers = Array.from({ length: availableImageCount }, (_, i) => i + 1);
    
    // Initialize smooth scrolling
    const lenis = new Lenis({
      autoRaf: true,
      smoothWheel: true,
      lerp: 0.1
    });

    // Global variables
    let scene, camera, renderer, galleryGroup;
    let blocks = [];
    let currentScroll = 0;
    let rotationSpeed = 0;
    let scrollDirection = 0;
    let viewAllMode = false;

    // Scene settings
    const radius = 6;
    const height = 30;
    const segments = 30;
    
    function initScene() {
      // Create scene
      scene = new THREE.Scene();
      
      // Create camera
      camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.z = 12;
      camera.position.y = 0;
      
      // Create renderer
      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0);
      document.body.appendChild(renderer.domElement);
      
      // Create gallery group
      galleryGroup = new THREE.Group();
      scene.add(galleryGroup);
      
      // Add lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 1);
      scene.add(ambientLight);
      
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
      directionalLight.position.set(1, 1, 1);
      scene.add(directionalLight);
    }

    function getRandomImageNumber() {
      // Get a random image from our available images
      return allImageNumbers[Math.floor(Math.random() * allImageNumbers.length)];
    }

    const textureLoader = new THREE.TextureLoader();
    
    function loadImageTexture(imageNumber) {
      return new Promise((resolve) => {
        const texture = textureLoader.load(
          `./img${imageNumber}.jpg`,
          (loadedTexture) => {
            loadedTexture.generateMipmaps = true;
            loadedTexture.minFilter = THREE.LinearMipmapLinearFilter;
            loadedTexture.magFilter = THREE.LinearFilter;
            loadedTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            resolve(loadedTexture);
          },
          undefined,
          (error) => {
            console.error(`Error loading image ${imageNumber}:`, error);
            // Fallback to a default texture
            const fallbackTexture = textureLoader.load('./img1.jpg', resolve);
          }
        );
      });
    }

    function createCurvedPlane(width, height, radius, segments) {
      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      const indices = [];
      const uvs = [];

      const segmentsX = segments * 4;
      const segmentsY = Math.floor(height * 12);
      const theta = width / radius;

      for (let y = 0; y <= segmentsY; y++) {
        const yPos = (y / segmentsY - 0.5) * height;
        for (let x = 0; x <= segmentsX; x++) {
          const xAngle = (x / segmentsX - 0.5) * theta;
          const xPos = Math.sin(xAngle) * radius;
          const zPos = Math.cos(xAngle) * radius;
          vertices.push(xPos, yPos, zPos);

          uvs.push((x / segmentsX) * 0.8 + 0.1, y / segmentsY);
        }
      }

      for (let y = 0; y < segmentsY; y++) {
        for (let x = 0; x < segmentsX; x++) {
          const a = x + (segmentsX + 1) * y;
          const b = x + (segmentsX + 1) * (y + 1);
          const c = x + 1 + (segmentsX + 1) * (y + 1);
          const d = x + 1 + (segmentsX + 1) * y;
          indices.push(a, b, d);
          indices.push(b, c, d);
        }
      }

      geometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(vertices, 3)
      );
      geometry.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();

      return geometry;
    }

    const numVerticalSections = 10;
    const blocksPerSection = 4;
    const verticalSpacing = 6;
    const usedImageNumbers = new Set();

    async function createBlock(baseY, yOffset, sectionIndex, blockIndex) {
      // Modified dimensions - reduced width (from 5 to 3.5) and increased height (from 3 to 5)
      const blockGeometry = createCurvedPlane(3.5, 5, radius, 10);
      
      // Get a random image that hasn't been used yet
      let imageNumber;
      do {
        imageNumber = getRandomImageNumber();
      } while (usedImageNumbers.size < availableImageCount && usedImageNumbers.has(imageNumber));
      
      // If we've used all images, reset the tracking
      if (usedImageNumbers.size >= availableImageCount) {
        usedImageNumbers.clear();
      }
      
      usedImageNumbers.add(imageNumber);
      
      const texture = await loadImageTexture(imageNumber);

      const blockMaterial = new THREE.MeshPhongMaterial({
        map: texture,
        side: THREE.DoubleSide,
        toneMapped: false,
      });

      const block = new THREE.Mesh(blockGeometry, blockMaterial);
      block.position.y = baseY + yOffset;
      block.userData = { imageNumber };

      const blockContainer = new THREE.Group();

      const sectionAngle = (Math.PI * 2) / blocksPerSection;
      const maxRandomAngle = sectionAngle * 0.3;
      const baseAngle = sectionAngle * blockIndex;
      const randomAngleOffset = (Math.random() * 2 - 1) * maxRandomAngle;
      const finalAngle = baseAngle + randomAngleOffset;

      blockContainer.rotation.y = finalAngle;
      blockContainer.add(block);

      return blockContainer;
    }

    async function initializeBlocks() {
      const totalBlockHeight = numVerticalSections * verticalSpacing;
      const heightBuffer = (height - totalBlockHeight) / 2;
      const startY = -height / 2 + heightBuffer + verticalSpacing;
      
      // Create gallery blocks
      for (let section = 0; section < numVerticalSections; section++) {
        const baseY = startY + section * verticalSpacing;

        for (let i = 0; i < blocksPerSection; i++) {
          const yOffset = Math.random() * 0.2 - 0.1;

          const blockContainer = await createBlock(baseY, yOffset, section, i);
          blocks.push(blockContainer);
          galleryGroup.add(blockContainer);
        }
      }
      
      // Hide the loader
      const loader = document.querySelector('.loader');
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
      }, 500);
    }

    const baseRotationSpeed = 0.0025;
    const maxRotationSpeed = 0.05;
    
    function setupScrollHandling() {
      lenis.on("scroll", (e) => {
        currentScroll = window.pageYOffset;
        rotationSpeed = e.velocity * 0.005;
        scrollDirection = Math.sign(e.velocity);
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      if (!viewAllMode) {
        const totalScroll = document.documentElement.scrollHeight - window.innerHeight;
        const scrollFraction = currentScroll / totalScroll;
        const targetY = scrollFraction * height - height / 2;
        camera.position.y = -targetY;

        // Apply rotation based on scroll direction and speed
        galleryGroup.rotation.y += (baseRotationSpeed + Math.abs(rotationSpeed)) * 
                                  (scrollDirection !== 0 ? scrollDirection : 1);

        // Dampen rotation speed
        rotationSpeed *= 0.95;
      }

      renderer.render(scene, camera);
    }

    function setupResizeHandler() {
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      });
    }

    function setupViewAllMode() {
      const viewAllBtn = document.querySelector('.view-all-btn');
      const gridView = document.querySelector('.grid-view');
      const closeBtn = document.querySelector('.close-btn');
      const gridContainer = document.querySelector('.grid-container');
      
      // Populate grid view with all images
      for (let i = 1; i <= availableImageCount; i++) {
        const gridItem = document.createElement('div');
        gridItem.className = 'grid-item';
        
        const img = document.createElement('img');
        img.src = `./img${i}.jpg`;
        img.alt = `Gallery Image ${i}`;
        img.loading = 'lazy';
        
        gridItem.appendChild(img);
        gridContainer.appendChild(gridItem);
      }
      
      // Show grid view when button is clicked
      viewAllBtn.addEventListener('click', () => {
        gridView.style.display = 'block';
        viewAllMode = true;
        
        // When in view all mode, disable the main page scrolling
        document.body.style.overflow = 'hidden';
        
        // Allow scrolling within the grid view
        lenis.stop();
      });
      
      // Hide grid view when close button is clicked
      closeBtn.addEventListener('click', () => {
        gridView.style.display = 'none';
        viewAllMode = false;
        
        // Re-enable main page scrolling
        document.body.style.overflow = '';
        
        // Re-enable smooth scrolling
        lenis.start();
      });
    }

    // Hide scroll indicator after some scrolling
    function setupScrollIndicator() {
      const scrollIndicator = document.querySelector('.scroll-indicator');
      
      window.addEventListener('scroll', () => {
        if (window.scrollY > window.innerHeight * 0.3) {
          scrollIndicator.style.opacity = '0';
          setTimeout(() => {
            scrollIndicator.style.display = 'none';
          }, 500);
        }
      });
    }

    // Initialize everything
    async function init() {
      initScene();
      setupScrollHandling();
      setupResizeHandler();
      setupViewAllMode();
      setupScrollIndicator();
      await initializeBlocks();
      animate();
    }

    // Start the application
    init();
  </script>
</body>

</html>
